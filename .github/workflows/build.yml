name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Checkout and build NavAuth for mavenLocal
        uses: actions/checkout@v4
        with:
          repository: Navio1430/NavAuth
          path: NavAuth

      - name: Publish NavAuth to mavenLocal
        working-directory: ./NavAuth
        run: |
          chmod +x gradlew
          ./gradlew publishToMavenLocal
        env:
          GITHUB_TOKEN: ""

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: domainrouter
          path: build/libs/domainrouter-*.jar
